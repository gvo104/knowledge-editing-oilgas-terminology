alg_name: "MEMIT"
model_name: "./my_exp/models/Qwen2.5-3B"
stats_dir: "./my_exp/stats"
device: 0

layers: [4, 5, 6]
clamp_norm_factor: 4
layer_selection: "all"
fact_token: "subject_last"
v_num_grad_steps: 10
v_lr: 5e-1
v_loss_layer: 35
v_weight_decay: 1e-3
kl_factor: 0.0625
mom2_adjustment: true
mom2_update_weight: 5000

rewrite_module_tmp: "model.layers.{}.mlp.down_proj"
layer_module_tmp: "model.layers.{}"
mlp_module_tmp: "model.layers.{}.mlp"
attn_module_tmp: "model.layers.{}.self_attn"
ln_f_module: "model.norm"
lm_head_module: "model.embed_tokens"

mom2_dataset: "./my_exp/data/wiki_20220301_simple/data/20220301.simple"
mom2_n_samples: 256
mom2_dtype: "float32"
batch_size: 1
max_length: 64
model_parallel: false
